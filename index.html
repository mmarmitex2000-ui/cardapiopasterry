<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Pasterry</title>
<style>
:root{
  --bg:#1A1210; --card:#E8F5E9; --accent:#07fcdb; --muted:#1A1210; --danger:#ac940d;
  --glass: rgb(255, 217, 0); --ok:#2b7245;
  --header-collapsed-h: 58px;
  font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
}
html,body{height:100%;margin:0;background:linear-gradient(180deg,#1A1210 0%, #1A1210 60%);color:#e6eef6;-webkit-font-smoothing:antialiased; scroll-behavior: smooth;}
.app{min-height:100vh;display:flex;flex-direction:column}

html, body{
  -ms-overflow-style: none;
  scrollbar-width: none;
}
html::-webkit-scrollbar, body::-webkit-scrollbar{
  width: 0; height: 0;
}

/* ===== HEADER ATUALIZADO (Efeito de recolher via CSS) ===== */
header{
  position: sticky; 
  top: -155px; 
  z-index: 60;
  display: grid; 
  place-items: center;
  padding: 15px 16px 10px;
  background: linear-gradient(180deg, #1A1210, rgba(7,20,40,0.85));
  backdrop-filter: blur(8px);
  border-bottom: 1px solid #1A1210;
}

.brand{ display: flex; flex-direction: column; align-items: center; }

.logo{
  width: 120px; height: 120px; border-radius: 100px; overflow: hidden;
  display:flex; align-items:center; justify-content:center;
  background:#1A1210; box-shadow: 0 10px 30px #1A1210;
  animation: logo-fade linear both;
  animation-timeline: scroll();
  animation-range: 150px 250px;
}
.logo img{ width:100%; height:100%; object-fit:cover; display:block }

@keyframes logo-fade {
  to { opacity: 0; transform: scale(0.7) translateY(-20px); filter: blur(4px); }
}

/* ===== MAIN ===== */
main{flex:1;display:flex;flex-direction:column;gap:12px;padding:10px 20px;box-sizing:border-box; padding-bottom: 90px;}

/* ===== CATEGORIAS ===== */
.categories{
  position: sticky;
  top: 0;
  z-index: 70;
  display: grid; 
  grid-auto-flow: column;
  grid-auto-columns: 25%; /* Para mostrar 4 itens */
  gap: 10px;
  overflow-x: auto;
  padding:12px 8px;
  background: #1A1210; 
  border-radius:14px; 
  scrollbar-width:none; 
  -ms-overflow-style:none; 
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory; /* Efeito de "trava" na rolagem */
}
.categories::-webkit-scrollbar{display:none}

.cat {
  padding: 9px 15px; 
  border-radius: 20px;
  font-size: 14px; 
  min-width: 90px;
  scroll-snap-align: start; /* Alinha o início do item com o container */
  background: var(--glass); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  cursor: pointer; 
  font-weight: 800;
  color: #1a1600; 
  white-space: nowrap; 
  text-align: center;
  transition: transform .08s ease;
}

.cat.active {
  outline: 3px solid var(--accent);
  box-shadow: 0 6px 20px rgba(0,0,0,0.5); 
  transform: scale(1.05);
}

.cat-section{
  display:block;
  margin: 10px 4px 24px;
  padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.cat-section:first-child{ border-top: 0; margin-top: 0; }

.cat-section > .muted{
  font-weight: 800;
  letter-spacing: .3px;
  margin: 6px 4px 12px;
  opacity: .85;
}

.products{
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

/* Ajustes no card do produto */
.product{
  background:linear-gradient(180deg, rgba(30, 30, 30, 0.02), rgba(25, 25, 25, 0.01)); 
  padding:14px; 
  border-radius:20px; 
  display:flex; 
  flex-direction:row;
  gap:16px;
  align-items: center;
  overflow:hidden; 
  scroll-margin-top: 20px; 
  border: 1px solid rgba(255,255,255,0.05);
}
.product .media{
  position:relative; 
  flex-shrink: 0;
  width: 120px;
  height: 120px;
  border-radius:12px; 
  overflow:hidden; 
  background:#0c1220;
}
.product .media > img{
  position:absolute; 
  inset:0; 
  width:100%; 
  height:100%; 
  object-fit:cover; 
  object-position:center; 
  display:block;
}

.product .text-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}

.title{font-weight:700; font-size:18px; line-height: 1.2;}
.price{color:var(--danger); font-weight:700; font-size:17px}
.muted{color:#9aa6b2; font-size:13px; line-height: 1.3;}

.product .info-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

.add-btn{
  width: auto;
  padding:10px 20px;
  border-radius:8px; 
  background:var(--ok); 
  border:0; 
  color:#fff; 
  font-weight:800; 
  cursor:pointer;
  flex-shrink: 0;
}
.add-btn:active{ transform: scale(0.97); filter: brightness(0.9); box-shadow: inset 0 3px 6px rgba(0,0,0,.25); }

/* ===== Media Queries para Responsividade ===== */
@media (max-width: 600px) {
  main { padding: 10px; }
  .categories { grid-auto-columns: 33%; }
  .product .media { width: 100px; height: 100px; }
  .title { font-size: 16px; }
  .price { font-size: 15px; }
  .add-btn { padding: 8px 16px; }
  .dialog { flex-direction: column; }
  .size-image-wrap { width: 100%; }
  .size-image { height: 150px; }
}

#currentCat{
  position: sticky;
  top: calc(var(--header-collapsed-h) + 8px);
  z-index: 69;
}
.products-wrap{ padding: 8px 6px 24px; }
.content{display:flex;gap:18px}
.left{flex:1;display:flex;flex-direction:column;min-width:0}

.btn{flex:1; padding:14px; border-radius:10px; border:0; background:var(--glass); color:#1a1600; cursor:pointer; font-weight:800; font-size:16px}
.btn.secondary{background:var(--glass); color:#1a1600; opacity:.9}
.btn:disabled{opacity:.6; cursor:not-allowed}

.overlay{position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); z-index:80; backdrop-filter: blur(4px);}
.dialog{width:840px; max-width:95%; background:#272323; border-radius:12px; padding:20px; display:flex; gap:12px; box-shadow:0 20px 60px rgba(2,6,23,0.8)}
.left-panel{flex:1; display:flex; flex-direction:column; gap:10px}
.kbd{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
.kbd button{padding:18px 12px; font-size:20px; border-radius:10px; background:var(--glass); border:1px solid rgba(255,255,255,0.03); color:#eaf6f2}
.num-display{font-size:40px; background:#021522; padding:12px; border-radius:10px; text-align:right; color:var(--accent); font-weight:800}
.attract{position:fixed; inset:0; background-image:linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.6)); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; overflow:hidden}
.attract.hidden{display:none}
.attract h1{font-size:56px; margin:0 0 10px; color:var(--accent)}
.attract p{color:var(--muted); font-size:22px; margin:0 0 20px}
.attract-logo{position:absolute; inset:0; margin:auto; width:min(92vmin, 900px); height:auto; opacity:1; filter:none; pointer-events:none; user-select:none}
.big-btn{padding:18px 30px; border-radius:14px; background:var(--accent); color:#022; font-weight:900; font-size:20px; border:0; cursor:pointer}
@media (max-width:900px){ main{gap:10px} .content{flex-direction:column} }
@media (max-height:760px){ .logo{ width:100px; height:100px } header{top: -130px;} }
button:focus{outline:3px solid rgba(221, 2, 2, 0.12)}
button,.btn,.big-btn,.cat{ transition: transform .08s ease, box-shadow .12s ease, filter .12s ease }
button:active,.btn:active,.big-btn:active,.cat:active{ transform:scale(0.97); filter:brightness(0.96); box-shadow:inset 0 6px 14px rgba(0,0,0,.25) }
.press{ animation: pressPop .18s ease }
@keyframes pressPop{ 0%{transform:scale(1)} 40%{transform:scale(0.95)} 100%{transform:scale(1)} }
.size-image-wrap{width:260px; display:flex; flex-direction:column; gap:10px; align-items:stretch}
.size-image{width:100%; height:180px; object-fit:cover; border-radius:12px; background:#0c1220; box-shadow:0 10px 30px rgba(0,0,0,.5)}
/* TOAST */
#toastWrap{ position:fixed; left:0; right:0; top:14px; z-index:120; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none }
.toast{ pointer-events:auto; display:flex; align-items:center; gap:10px; background:rgba(7,20,40,.92); color:#e6eef6; border:1px solid rgba(255,255,255,.06); box-shadow:0 10px 30px rgba(0,0,0,.5); padding:12px 14px; border-radius:12px; min-width:280px; max-width:90vw; transform:translateY(-12px); opacity:0; animation:toastIn .18s ease forwards, toastOut .18s ease forwards 1.6s }
.toast.check{ width:28px; height:28px; border-radius:8px; background:var(--ok); display:grid; place-items:center; font-weight:900; color:#fff }
.toast.title{ font-weight:800; font-size:15px; line-height:1.2 }
.toast.sub{ color:var(--muted); font-size:13px }
@keyframes toastIn{ to{ transform:translateY(0); opacity:1 } }
@keyframes toastOut{ to{ transform:translateY(-8px); opacity:0 } }
/* RODAPÉ */
.footer-bar{ position:fixed; left:0; right:0; bottom:0; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); background:linear-gradient(180deg, rgba(7,20,40,0.0), rgba(7,20,40,0.85) 30%, rgba(7,20,40,0.95)); backdrop-filter:blur(6px); border-top:1px solid rgba(255,255,255,0.06); z-index:70 }
.footer-cart{ width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 16px; border-radius:14px; background:var(--danger); color:#fff; font-weight:900; font-size:18px; border:0; cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 -2px 0 rgba(0,0,0,.15) }
.footer-cart .cart-ico{ display:grid; place-items:center }
.footer-cart .cart-label{ flex:1; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.footer-cart .cart-total{ font-weight:900; margin-right:8px; white-space:nowrap }
.footer-cart .cart-badge{ min-width:28px; height:28px; padding:0 8px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; background:rgba(0,0,0,.25); color:#fff; font-weight:900; font-size:14px; box-shadow:inset 0 -2px 0 rgba(0,0,0,.2) }
@media (max-width:380px){ .footer-cart .cart-label{ display:none } }
</style>
</head>

  <!-- Toast container -->

    <!-- Modal editar quantidade -->

    const CART_KEY = 'pasterry_cart_v1';

    function resetIdleTimer(){ if (idleTimer) clearTimeout(idleTimer); idleTimer = setTimeout(()=> showAttract(), IDLE_TIMEOUT); }
    function showAttract(){ attract.classList.remove('hidden'); }
    function hideAttract(){ attract.classList.add('hidden'); }
    document.addEventListener('touchstart', resetIdleTimer, {passive:true});
    document.addEventListener('mousedown', resetIdleTimer);

    function getCartCount(){ return cart.reduce((s,i)=>s+i.qty,0); }
    function getCartTotal(){ return cart.reduce((s,i)=> s + (i.price * i.qty), 0); }
    function updateCheckoutText(){
      const n = getCartCount();
      const total = getCartTotal();
      if (cartBadge) cartBadge.textContent = n;
      const totalEl = document.getElementById('cartTotal');
      if (totalEl) totalEl.textContent = formatBRL(total);
      if (checkoutBtn) checkoutBtn.setAttribute('aria-label', `Ver carrinho (${n} itens, ${formatBRL(total)})`);
    }
    function pulseCart(){
      const btn = document.getElementById('checkoutBtn');
      const badge = document.getElementById('cartBadge');

    function setActiveCategory(catId, {scrollIntoView=false}={}){
      if (!catId || (activeCategory === catId &&!scrollIntoView)) return;
      activeCategory = catId;
      document.querySelectorAll('.cat').forEach(b=>{
        const isActive = b.dataset.cat === catId;
        b.classList.toggle('active', isActive);
        if (isActive && scrollIntoView) b.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
      });
    }

    function renderCategories(){
      categoriesEl.innerHTML = '';
      CATEGORIES.forEach(cat=>{
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'cat' + (cat.id === activeCategory? ' active' : '');
        b.dataset.cat = cat.id;
        b.textContent = cat.name;
        b.setAttribute('role','tab');
        b.addEventListener('click', ()=>{
          const section = document.querySelector(`.cat-section[data-cat="${cat.id}"]`);
          if (section) section.scrollIntoView({behavior:'smooth', block:'start'});
          setActiveCategory(cat.id, {scrollIntoView:true});
          resetIdleTimer();
        });
        categoriesEl.appendChild(b);
      });
      document.querySelectorAll('.cat').forEach(bindPressAnimation);
    }

    function renderProducts(){
      productsEl.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const section = document.createElement('section');
        section.className = 'cat-section';
        section.dataset.cat = cat.id;
        section.style.scrollMarginTop = '90px';

        const header = document.createElement('div');
        header.className = 'muted';
        header.style.cssText = 'font-weight:800; letter-spacing:.3px; margin:6px 4px 10px; opacity:.8';
        header.textContent = cat.name;
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'products';

        const list = PRODUCTS[cat.id] || [];
        list.forEach(p=>{
          const card = document.createElement('div');
          card.className = 'product';
          card.tabIndex = 0;
          card.setAttribute('role','listitem');

          const media = document.createElement('div');
          media.className = 'media';
          const img = document.createElement('img');
          img.alt = p.title;
          img.src = p.img || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='400'><rect width='100%' height='100%' fill='%230a1420'/><text x='50%' y='50%' fill='%23a7b6c1' font-size='20' text-anchor='middle' dominant-baseline='middle'>Imagem</text></svg>";
          media.appendChild(img);
          card.appendChild(media);

          const textContent = document.createElement('div');
          textContent.className = 'text-content';

          const title = document.createElement('div'); title.className = 'title'; title.textContent = p.title;
          const desc = document.createElement('div'); desc.className = 'muted'; desc.textContent = p.desc || '';
          
          const infoFooter = document.createElement('div');
          infoFooter.className = 'info-footer';

          const price = document.createElement('div'); price.className = 'price';
          if (p.sizes) {
            const minPrice = Math.min(...Object.values(p.sizes));
            price.textContent = `A partir de ${formatBRL(minPrice)}`;
          } else {
            price.textContent = formatBRL(p.price);
          }

          infoFooter.appendChild(price);
          infoFooter.appendChild(addBtn);
          
          textContent.appendChild(title);
          textContent.appendChild(desc);
          textContent.appendChild(infoFooter);

          card.appendChild(textContent);
          grid.appendChild(card);
        });

        section.appendChild(grid);
        productsEl.appendChild(section);
      });

      document.querySelectorAll('.add-btn').forEach(bindPressAnimation);

    // ====== Toast helper ======
    function showToast({title='Item adicionado', sub=''}={}){
      const el = document.createElement('div');
      el.className = 'toast';
      el.innerHTML = `
        <div class="check">✓</div>
        <div>
          <div class="title">${title}</div>
          ${sub? `<div class="sub">${sub}</div>` : ``}
        </div>`;
      toastWrap.appendChild(el);
      setTimeout(()=>{ el.remove(); }, 1900);
    }

    function addToCart(productId, category){
      const p = (PRODUCTS[category]||[]).find(x=>x.id===productId);
      if(!p) return;
      const existing = cart.find(i=>i.id===productId);
      if(existing) existing.qty += 1;
      else cart.push({ id: p.id, title: p.title, price: p.price, qty: 1, img: p.img });
      saveCart(); hideAttract(); resetIdleTimer(); pulseCart();
      const q = (existing? existing.qty : 1);
      showToast({ title: `${p.title} adicionado`, sub: `Quantidade no carrinho: ${q}` });
    }

    function addToCartWithSize(p, sizeKey){
      const price = p.sizes[sizeKey];
      const categoryId = activeCategory;
      let unit = 'cm';
      if (categoryId === 'acai') unit = 'ml';
      if (categoryId === 'salgados' || categoryId === 'churros') unit = ' unid.';

      const variantId = `${p.id}-${sizeKey}`;
      const titleWithSize = `${p.title} ${sizeKey}${unit}`;
      const existing = cart.find(i=>i.id===variantId);
      if(existing) existing.qty += 1;
      else cart.push({ id: variantId, title: titleWithSize, price, qty: 1, img: p.img });
      saveCart(); hideAttract(); resetIdleTimer(); pulseCart();
      const q = (existing? existing.qty : 1);
      showToast({ title: `${titleWithSize} adicionado`, sub: `Quantidade no carrinho: ${q}` });
    }

    let editingIndex = null;
    function openQtyDialog(idx){
      editingIndex = idx;
      numDisplay.textContent = String(cart[idx].qty);
      overlay.style.display = 'flex';
      overlay.setAttribute('aria-hidden','false');
      document.getElementById('kbd').querySelectorAll('button').forEach(b=>{ b.onclick = ()=> handleKey(b.dataset.key); });
      document.querySelectorAll('#kbd button, #saveQty, #cancelQty').forEach(bindPressAnimation);
      resetIdleTimer();
    }
    function closeQtyDialog(){ overlay.style.display = 'none'; overlay.setAttribute('aria-hidden','true'); editingIndex = null; }
    function handleKey(key){
      let v = numDisplay.textContent;
      if(key === 'back'){ v = v.slice(0,-1) || '0'; }
      else if(key === 'clear'){ v = '0'; }
      else { v = (v === '0')? key : v + key; }
      if(v.length > 4) v = v.slice(0,4);
      v = v.replace(/^0+(?=\d)/,'');
      if(v === '' ) v = '0';
      numDisplay.textContent = v;
    }
    document.getElementById('saveQty').addEventListener('click', ()=>{
      const n = parseInt(numDisplay.textContent || '0',10);
      if(!isNaN(n) && n>=1 && editingIndex!== null){ cart[editingIndex].qty = n; saveCart(); }
      closeQtyDialog();
    });
    document.getElementById('cancelQty').addEventListener('click', ()=> closeQtyDialog());
    overlay.addEventListener('click', (e)=> { if(e.target === overlay) closeQtyDialog(); });

    const sizeOverlay = document.getElementById('sizeOverlay');
    const sizeTitle = document.getElementById('sizeTitle');
    const sizeDesc = document.getElementById('sizeDesc');
    const sizeOptions = document.getElementById('sizeOptions');
    const sizeImg = document.getElementById('sizeImg');
    let pendingProduct = null;

    function openSizeDialog(p){
      pendingProduct = p;
      sizeTitle.textContent = p.title;
      sizeDesc.textContent = p.desc || '';

      sizeOptions.innerHTML = '';
      const entries = Object.entries(p.sizes || {}).sort((a,b)=> Number(a[0]) - Number(b[0]));
      const categoryId = activeCategory;
      
      entries.forEach(([size, price])=>{
        let unit = 'cm';
        if (categoryId === 'acai') unit = 'ml';
        if (categoryId === 'salgados' || categoryId === 'churros') unit = ' unid.';

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn';
        btn.style.display = 'flex';
        btn.style.justifyContent = 'space-between';
        btn.style.alignItems = 'center';
        const label = `${size}${unit}`;
        btn.innerHTML = `<span>${label}</span><strong>${formatBRL(price)}</strong>`;
        btn.addEventListener('click', ()=>{
          addToCartWithSize(p, size);
          closeSizeDialog();
        });
        bindPressAnimation(btn);
        sizeOptions.appendChild(btn);
      });

      sizeImg.src = p.img || '';
      sizeImg.alt = p.title;
      sizeOverlay.style.display = 'flex';
      sizeOverlay.setAttribute('aria-hidden','false');
      resetIdleTimer();
    }
    function closeSizeDialog(){
      sizeOverlay.style.display = 'none';
      sizeOverlay.setAttribute('aria-hidden','true');
      pendingProduct = null;
    }
    sizeOverlay.addEventListener('click', (e)=>{ if(e.target === sizeOverlay) closeSizeDialog(); });

    // Ação: abrir o carrinho
    checkoutBtn.addEventListener('click', ()=>{
      saveCart();
      window.location.href = 'carrinho.html';
    });

    document.getElementById('startBtn').addEventListener('click', ()=>{ hideAttract(); resetIdleTimer(); scrollProductsToTop(); });
    attract.addEventListener('click', ()=> { hideAttract(); resetIdleTimer(); scrollProductsToTop(); });

    function bindPressAnimation(el){
      if(!el) return;
      const add = ()=>{ el.classList.remove('press'); void el.offsetWidth; el.classList.add('press'); };
      el.addEventListener('mousedown', add);
      el.addEventListener('touchstart', add, {passive:true});
    }

    document.querySelectorAll('button,.btn,.big-btn,.cat').forEach(bindPressAnimation);

    // ====== IMPRESSÃO & SUCESSO (fallback via browser) ======
    function nowStr(){
      const d = new Date();
      const pad = n => String(n).padStart(2,'0');
      return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function buildTicketHTML(cartData){
      const total = cartData.reduce((s,i)=> s + i.price*i.qty, 0);
      const items = cartData.map(i => `
        <div class="item">
          <div class="title">${i.title}</div>
          <div class="row">
            <div><span class="label">QTD</span><span class="value">${i.qty}</span></div>

          </div>
          ${i.note? `<div class="note"><span class="label">OBS</span> <span class="value">${i.note}</span></div>` : ``}
        </div>
      `).join('');

      return `
        <div class="ticket">
          <h1>PASTERRY - PEDIDO</h1>
          <div class="meta">${nowStr()}</div>
          <div class="line"></div>
          <div class="items">${items || '<div class="center">CARRINHO VAZIO</div>'}</div>
          <div class="totals">
            <div class="row"><span>TOTAL</span><span>${formatBRL(total)}</span></div>

          <div class="thank">OBRIGADO! BOM APETITE 😊</div>

      `;
    }

    // --- Sincronização do carrinho entre abas (totem/carrinho/relatórios) ---
    function refreshCartFromStorage(){
      try {
        const raw = localStorage.getItem(CART_KEY);
        cart = raw? JSON.parse(raw) : [];
      } catch { cart = []; }
      updateCheckoutText();
    }
    window.addEventListener('storage', (e)=>{
      if (e.key === CART_KEY || e.key === 'pasterry_sales_v1') refreshCartFromStorage();
    });
    window.addEventListener('focus', refreshCartFromStorage);
    document.addEventListener('visibilitychange', ()=>{ if (document.visibilityState === 'visible') refreshCartFromStorage(); });

    // Colapsar/expandir header conforme rola a lista de produtos
    (function(){
      const headerEl = document.querySelector('header');
      const productsWrapEl = document.querySelector('.products-wrap');
      if(!headerEl ||!productsWrapEl) return;

      let ticking = false;
      const THRESHOLD = 24; // pixels de scroll para começar a sumir

      function onScroll(){
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(()=>{
          const y = productsWrapEl.scrollTop || 0;
          if (y > THRESHOLD) headerEl.classList.add('collapsed');
          else headerEl.classList.remove('collapsed');
          ticking = false;
        });
      }

      productsWrapEl.addEventListener('scroll', onScroll, { passive: true });

      // Garantir estado inicial correto ao trocar categoria/voltar do atrativo
      const reset = ()=>{ productsWrapEl.scrollTop = 0; headerEl.classList.remove('collapsed'); };
      document.getElementById('startBtn')?.addEventListener('click', reset);
      document.getElementById('attract')?.addEventListener('click', reset);
    })();

    // Inicialização final
    renderCategories(); renderProducts(); updateCheckoutText();

    // Scroll Spy: ativa a categoria conforme a seção visível
  // Scroll Spy: ativa a categoria conforme a seção visível + mostra rótulo
(function initScrollSpy(){
  const wrap = document.querySelector('.products-wrap') || document.scrollingElement;
  const label = document.getElementById('currentCatName');
  if (!wrap) return;

  let isClickScrolling = false;
  let clickTimeout = null;

  document.getElementById('categories')?.addEventListener('click', (e)=>{
    if (e.target.closest('.cat')) {
      isClickScrolling = true;
      clearTimeout(clickTimeout);
      clickTimeout = setTimeout(()=>{ isClickScrolling = false; }, 600);
    }
  });

  function updateCurrent(catId){
    setActiveCategory(catId); // só marca a aba, sem forçar scroll
    const cat = CATEGORIES.find(c=>c.id===catId);
    if (label && cat) label.textContent = cat.name;
  }

  const io = new IntersectionObserver((entries)=>{
    if (isClickScrolling) return;
    const visible = entries
    .filter(e=>e.isIntersecting)
    .sort((a,b)=>b.intersectionRatio - a.intersectionRatio)[0];
    const catId = visible?.target?.dataset?.cat;
    if (catId) updateCurrent(catId);
  }, {
    root: wrap,
    threshold: [0.25, 0.5, 0.75],
    rootMargin: '-90px 0px -45% 0px'
  });

  const observeAll = ()=> document.querySelectorAll('.cat-section').forEach(sec=>io.observe(sec));
  observeAll();

  const _renderProducts = renderProducts;
  renderProducts = function(){ _renderProducts(); observeAll(); };

  // estado inicial
  updateCurrent(CATEGORIES[0].id);
})();

    window.addToCart = addToCart; window.openQtyDialog = openQtyDialog;
    document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') { if(overlay.style.display === 'flex') closeQtyDialog(); if(sizeOverlay.style.display === 'flex') closeSizeDialog(); } resetIdleTimer(); });
    // Começa escondido; só aparece por inatividade
    attract.classList.add('hidden');
    resetIdleTimer();
    
    
window.onscroll = function(){
  let currentSectionId = '';
  document.querySelectorAll('.cat-section').forEach(section => {
    const sectionTop = section.offsetTop;
    if (window.pageYOffset >= sectionTop - 100) {
      currentSectionId = section.getAttribute('data-cat');
    }
  });
  if (currentSectionId) {
    setActiveCategory(currentSectionId);
  }
};
